pesq.d3.scaffold.explain.meaning=Cette visualisation rapproche la figure de scaffolding du journal réel de Gerard. Au lieu de représenter un épisode fixe, elle utilise une ligne du journal pour montrer quels appuis, actions et invariants peuvent être présents à ce moment de l’interaction.
pesq.d3.scaffold.explain.benefit=Le chercheur peut sélectionner une ligne précise et vérifier comment elle est traduite visuellement en types de scaffolding, en comparant action du sujet, intervention de l’interface, erreur, réussite et règles de représentation.
