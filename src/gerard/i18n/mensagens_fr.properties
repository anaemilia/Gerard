pesq.group.g1=G1 - Autonomie opérationnelle
pesq.group.g1.criteria=Faible incidence d’erreur et prédominance d’actions correctes ou neutres ; le sujet catégorise, remplit le modèle et conclut avec peu d’intervention corrective.
pesq.group.g2=G2 - Erreur de règle de représentation
pesq.group.g2.criteria=Occurrence d’erreurs ou de retours liés au nombre relatif, au signe, à la relation positive/négative ou à la représentation formelle de la transformation/comparaison.
pesq.group.g3=G3 - Erreur conceptuelle de positionnement
pesq.group.g3.criteria=Occurrence d’erreurs où le nombre ou l’inconnue est associé à un espace conceptuellement inadéquat du modèle.
pesq.group.g4=G4 - Aide insuffisante ou mal focalisée
pesq.group.g4.criteria=Répétition d’erreur, demande d’aide ou séquence où le retour précédent ne semble pas traiter la cause de la difficulté.
pesq.group.g5=G5 - Réorganisation après aide spécifique
pesq.group.g5.criteria=Action correcte du sujet immédiatement après un retour, une étiquette, un indice, une explication du signe ou une autre intervention focalisée de l’agent/interface.
pesq.neutral.reading=Lecture de l’énoncé
