pesq.d3.explain.noExample=Il n’y a pas encore assez de données pour générer une lecture automatique.
pesq.d3.explain.heatmap.rule=Dans la carte de chaleur, la couleur identifie le type d’événement et l’intensité de la cellule indique la fréquence : plus la cellule est sombre, plus le nombre d’occurrences est élevé.
pesq.d3.explain.flow.rule=Dans le réseau, la taille du nœud indique la quantité d’événements de ce type et l’épaisseur de la ligne indique la quantité de transitions entre deux types d’événement.
pesq.d3.explain.sequence.rule=Dans la séquence temporelle, la position horizontale indique l’ordre de l’action ; la couleur indique le type d’événement ; le contour sombre indique une action de l’ordinateur/interface.
pesq.d3.explain.colorLegend=Légende des couleurs : vert = réussite ; rouge = erreur ; orange = retour ; bleu = aide ; violet = doute ; gris = action neutre ; bleu-gris = action de l’interface ; graphite = action du sujet.
