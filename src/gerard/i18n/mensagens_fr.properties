pesq.neutral.helpRequest=Demande d’aide ou d’indice
pesq.neutral.helpRequest.justification=Demander de l’aide indique une recherche de soutien, mais ne constitue pas en soi une réussite ou une erreur.
pesq.neutral.dataEntryQuestion=Question opérationnelle sur la saisie des données
pesq.neutral.dataEntryQuestion.justification=La difficulté concerne la manière de saisir des valeurs ou des signes dans l’interface.
pesq.neutral.modelUseQuestion=Question sur l’utilisation du modèle
pesq.neutral.modelUseQuestion.justification=Le doute concerne le fonctionnement de l’artefact ou le lieu de l’action dans l’interface.
pesq.neutral.procedureQuestion=Demande de clarification de procédure
pesq.neutral.procedureQuestion.justification=La question concerne la procédure d’exécution, non le contenu mathématique lui-même.
pesq.neutral.confirmInstruction=Confirmation de l’instruction
pesq.neutral.confirmInstruction.justification=Le clic d’avancement est opérationnel et ne représente pas une décision mathématique ou une association conceptuelle.
pesq.neutral.operational=Action neutre opérationnelle
pesq.neutral.operational.justification=L’action fait partie du parcours interactif, mais ne permet pas d’évaluer la résolution mathématique.
