pesq.t4.problem.01.statement=Autour de la table sont assis 4 garçons et 7 filles. Combien de personnes sont assises autour de la table ?
pesq.t4.problem.02.statement=Ricardo est parti de chez lui avec 6 billes. À son retour, il avait deux billes. Que s’est-il passé pendant le jeu ?
pesq.t4.problem.03.statement=Maria a acheté une boîte de chocolats pour 4 reais et il lui restait encore 4 reais. Combien possédait-elle avant l’achat ?
pesq.t4.problem.04.statement=Ricardo a 6 ans. Carlos a 4 ans de plus que lui. Quel âge a Carlos ?
pesq.t4.problem.05.statement=Carlos a 7 reais et Luiz a 6 reais de moins que lui. Combien de reais Luiz a-t-il ?
pesq.t4.problem.06.statement=Ricardo a 9 jouets, dont une partie sont des petites voitures et l’autre partie des poupées. Sachant qu’il y a 4 poupées, combien y a-t-il de petites voitures ?
