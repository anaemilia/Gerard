pesq.d3.explain.heatmap.title=Lecture de la carte de chaleur
pesq.d3.explain.heatmap.meaning=Dans Gerard, les cellules denses indiquent quels problèmes produisent le plus de réussites, d’erreurs, de retours, d’aides ou de doutes. Un problème avec beaucoup d’erreurs et d’aides peut signaler une difficulté plus forte de modélisation, surtout dans la relation entre l’énoncé et le diagramme.
pesq.d3.explain.heatmap.benefit=Le chercheur peut repérer rapidement les problèmes qui demandent une révision de l’énoncé, de la catégorie de Vergnaud, du message de retour ou du scaffolding proposé. Il peut aussi comparer si certains types d’erreur se concentrent en composition, transformation ou comparaison.
pesq.d3.explain.flow.title=Lecture du réseau de transitions
pesq.d3.explain.flow.meaning=Le réseau indique comment les événements s’enchaînent pendant la résolution. Des transitions fréquentes comme erreur vers retour vers réussite suggèrent une réorganisation de l’action ; des transitions comme erreur vers retour vers erreur peuvent indiquer une aide insuffisante ou un message ambigu.
pesq.d3.explain.flow.benefit=Le chercheur peut observer si l’intervention de Gerard fonctionne comme médiation ou si elle interrompt seulement la tâche. Le réseau aide à identifier la dépendance à l’aide, la persistance de l’erreur et les moments où l’interface favorise la correction après retour.
pesq.d3.explain.sequence.title=Lecture de la séquence temporelle
pesq.d3.explain.sequence.meaning=Chaque ligne montre la succession des actions dans une occurrence utilisateur/problème. Les séquences courtes avec beaucoup de réussites suggèrent une certaine fluidité ; les séquences longues alternant erreur, retour et aide indiquent un coût interactionnel plus élevé et une possible instabilité conceptuelle.
pesq.d3.explain.sequence.benefit=Le chercheur peut suivre le parcours de l’utilisateur sans s’appuyer uniquement sur le total des erreurs. La visualisation permet d’identifier à quel moment l’erreur apparaît, si l’utilisateur corrige après l’aide et si le problème exige beaucoup d’actions avant d’être conclu.
