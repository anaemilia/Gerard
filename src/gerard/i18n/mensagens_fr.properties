pesq.d3.flow.regulation.readingIntro=Les lectures sont calculées à partir de triades temporelles S → C → S, c’est-à-dire action du sujet, intervention de l’ordinateur et action suivante du sujet. Ont été identifiées
pesq.d3.flow.regulation.nodeRule=Dans le réseau, la taille du nœud indique le nombre d’événements de ce type et l’épaisseur de la ligne indique le nombre de transitions entre deux types d’événement.
pesq.d3.flow.regulation.relevance=cette lecture montre si les actions de Gerard produisent une réorganisation après l’erreur ou apparaissent comme des cycles répétés d’erreur et d’aide insuffisante.
pesq.d3.flow.regulation.meaning=Le réseau indique comment les événements s’enchaînent pendant la résolution. Des transitions fréquentes comme erreur vers feedback vers réussite suggèrent une réorganisation de l’action ; des transitions comme erreur vers feedback vers erreur peuvent indiquer une aide insuffisante ou un message ambigu.
pesq.d3.flow.regulation.use=Le chercheur peut observer si l’intervention de Gerard fonctionne comme médiation ou si elle interrompt seulement la tâche. Le réseau aide à identifier la dépendance à l’aide, la persistance de l’erreur et les moments où l’interface favorise la correction après feedback.
pesq.d3.flow.recurrence.readingIntro=Les lectures sont calculées à partir des triades S → C → S dans lesquelles la première action du sujet a été classée comme erreur. Ont été identifiées
pesq.d3.flow.recurrence.triplets=triades initiées par une erreur du sujet.
pesq.d3.flow.recurrence.nodeRule=Dans le réseau, la taille du nœud indique la récurrence de chaque catégorie et l’épaisseur de la ligne indique la fréquence de l’enchaînement entre erreur, intervention et action postérieure.
pesq.d3.flow.recurrence.relevance=cette lecture montre dans quelles parties de la tâche l’erreur tend à persister après l’intervention de l’ordinateur et à quels moments le sujet parvient à reprendre la résolution.
pesq.d3.flow.recurrence.meaning=Lorsque le réseau concentre des liens de l’erreur vers l’intervention puis vers une nouvelle erreur, cela peut indiquer un feedback insuffisant, une aide peu spécifique ou une difficulté conceptuelle non encore surmontée. Lorsque le chemin avance vers la réussite, il y a un indice de réorganisation après la médiation.
pesq.d3.flow.recurrence.use=Le chercheur peut localiser les points de Gerard où l’aide doit être reformulée. Le réseau permet aussi de distinguer une erreur occasionnelle d’un modèle récurrent de difficulté, surtout lorsque le même type de tâche réapparaît dans plusieurs problèmes.
pesq.d3.flow.effectiveness.readingIntro=La lecture croise chaque intervention de l’interface avec l’action immédiatement suivante du sujet. Ont été identifiées
pesq.d3.flow.effectiveness.interventions=interventions évaluables dans le journal.
pesq.d3.flow.effectiveness.matrixRule=Dans la matrice, les lignes représentent les types d’intervention de l’ordinateur et les colonnes représentent la réponse postérieure du sujet ; les valeurs les plus élevées indiquent des relations plus récurrentes.
pesq.d3.flow.effectiveness.relevance=cette lecture permet d’évaluer si le feedback et le scaffolding de Gerard sont suivis d’une réussite, d’une nouvelle erreur, d’un doute ou d’une action neutre.
pesq.d3.flow.effectiveness.meaning=Les interventions fréquemment suivies d’une réussite suggèrent une médiation productive. Les interventions suivies d’une nouvelle erreur peuvent indiquer une aide insuffisante ou ambiguë. Les interventions suivies d’un doute peuvent signaler une réflexion non résolue, et les actions neutres peuvent indiquer une interruption du flux de la tâche.
pesq.d3.flow.effectiveness.use=Le chercheur peut comparer les types d’intervention qui doivent être maintenus, ajustés ou remplacés. La matrice aide à fonder les décisions de redesign du feedback, du scaffolding et des messages de régulation de l’interface.
