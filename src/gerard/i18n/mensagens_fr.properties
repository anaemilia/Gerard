pesq.summary.text=Cette vue utilise uniquement le modèle d’analyse de l’étude. Les nombres affichés sont produits par l’usage réel de Gerard. Chaque action pertinente est enregistrée dans un fichier TSV avec les colonnes : agent de l’action, problème, tentative, tâche, C/E, instrument, fonction de l’artefact et règles. Les onglets et graphiques sont recalculés à partir de ces fichiers.\\n\\nFichier de la session actuelle : {0}
