pesq.d3.explain.heatmap.title=Reading the heatmap
pesq.d3.explain.heatmap.meaning=In Gerard, dense cells indicate which problems trigger more correct actions, errors, feedback, help or doubts. A problem with many error and help events may indicate greater difficulty in modelling, especially in the relation between the statement and the diagram.
pesq.d3.explain.heatmap.benefit=The researcher can quickly locate problems that require revision of the statement, the Vergnaud category, the feedback message or the scaffolding offered. It also helps compare whether certain error types concentrate in composition, transformation or comparison.
pesq.d3.explain.flow.title=Reading the transition network
pesq.d3.explain.flow.meaning=The network indicates how events chain together during problem solving. Frequent transitions such as error to feedback to correct action suggest reorganization of action; transitions such as error to feedback to error may indicate insufficient help or an ambiguous message.
pesq.d3.explain.flow.benefit=The researcher can observe whether Gerard's intervention works as mediation or merely interrupts the task. The network helps identify dependence on help, persistence of error and moments in which the interface favors correction after feedback.
pesq.d3.explain.sequence.title=Reading the temporal sequence
pesq.d3.explain.sequence.meaning=Each row shows the succession of actions in a user/problem occurrence. Short sequences with many correct actions suggest fluency; long sequences alternating error, feedback and help indicate higher interaction cost and possible conceptual instability.
pesq.d3.explain.sequence.benefit=The researcher can follow the user's path without relying only on error totals. The visualization makes it possible to identify when the error appears, whether the user corrects after help and whether the problem requires many actions before completion.
pesq.d3.explain.exampleLabel=Example read from the visualization
pesq.d3.explain.noExample=There is not enough data yet to generate an automatic reading.
pesq.d3.explain.heatmap.rule=In the heatmap, color identifies the event type and cell intensity indicates frequency: the darker the cell, the higher the number of occurrences.
pesq.d3.explain.flow.rule=In the network, node size indicates the number of events of that type and line thickness indicates the number of transitions between two event types.
pesq.d3.explain.sequence.rule=In the temporal sequence, the horizontal position indicates action order; color indicates event type; a dark outline indicates a computer/interface action.
pesq.d3.explain.colorLegend=Color legend: green = correct; red = error; orange = feedback; blue = help; purple = doubt; gray = neutral action; blue-gray = interface action; graphite = subject action.
