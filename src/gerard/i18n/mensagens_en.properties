pesq.neutral.returnAfterHelp=Return to the task after help
pesq.neutral.returnAfterHelp.justification=The action only resumes the resolution sequence after help.
pesq.neutral.helpRequest=Help or hint request
pesq.neutral.helpRequest.justification=Requesting help indicates support seeking, but is not by itself correct or incorrect.
pesq.neutral.dataEntryQuestion=Operational question about data entry
pesq.neutral.dataEntryQuestion.justification=The difficulty concerns how to enter values or signs in the interface.
pesq.neutral.modelUseQuestion=Question about model use
pesq.neutral.modelUseQuestion.justification=The doubt is related to the artifact behavior or the action location in the interface.
pesq.neutral.procedureQuestion=Procedure clarification request
pesq.neutral.procedureQuestion.justification=The question concerns the execution procedure, not the mathematical content itself.
pesq.neutral.confirmInstruction=Instruction confirmation
pesq.neutral.confirmInstruction.justification=The advance click is operational and does not represent a mathematical decision or conceptual association.
pesq.neutral.operational=Operational neutral action
pesq.neutral.operational.justification=The action is part of the interactive path, but it does not allow mathematical resolution to be evaluated.
