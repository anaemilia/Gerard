pesq.d3.scaffold.explain.meaning=This visualization links the scaffolding figure to Gerard's real log. Instead of representing a fixed episode, it uses one log row to show which supports, actions and invariants may be present at that moment of interaction.
pesq.d3.scaffold.explain.benefit=The researcher can select a specific row and check how it is visually translated into scaffolding types, comparing subject action, interface intervention, error, correct action and representation rules.
