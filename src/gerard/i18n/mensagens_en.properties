pesq.group.g1=G1 - Operational autonomy
pesq.group.g1.criteria=Low incidence of error and predominance of correct or neutral actions; the subject categorizes, fills the model and concludes with little corrective intervention.
pesq.group.g2=G2 - Representation-rule error
pesq.group.g2.criteria=Occurrence of errors or feedback related to the relative number, sign, positive/negative relation or formal representation of transformation/comparison.
pesq.group.g3=G3 - Conceptual positioning error
pesq.group.g3.criteria=Occurrence of errors in which the number or unknown is associated with a conceptually inadequate space in the model.
pesq.group.g4=G4 - Insufficient or poorly focused help
pesq.group.g4.criteria=Error repetition, help request or sequence in which the previous feedback does not seem to address the cause of the difficulty.
pesq.group.g5=G5 - Reorganization after specific help
pesq.group.g5.criteria=Correct subject action immediately after feedback, label, hint, sign explanation or another focused agent/interface intervention.
pesq.neutral.reading=Reading the statement
