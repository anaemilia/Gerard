pesq.t4.problem.01.statement=Around the table are seated 4 boys and 7 girls. How many people are seated around the table?
pesq.t4.problem.02.statement=Ricardo left home with 6 marbles. When he returned, he had two marbles. What happened in the game?
pesq.t4.problem.03.statement=Maria bought a box of chocolates for 4 reais and still had 4 reais left. How much did she have before making the purchase?
pesq.t4.problem.04.statement=Ricardo is 6 years old. Carlos is 4 years older than him. How old is Carlos?
pesq.t4.problem.05.statement=Carlos has 7 reais and Luiz has 6 reais less than him. How many reais does Luiz have?
pesq.t4.problem.06.statement=Ricardo has 9 toys, some are toy cars and the rest are dolls. Knowing there are 4 dolls, how many are toy cars?
