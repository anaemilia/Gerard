pesq.d3.flow.regulation.readingIntro=The readings were calculated from S → C → S temporal triads, that is, subject action, computer intervention and the next subject action. Identified
pesq.d3.flow.regulation.nodeRule=In the network, node size indicates the number of events of that type and line thickness indicates the number of transitions between two event types.
pesq.d3.flow.regulation.relevance=this reading shows whether Gerard's actions produce reorganization after error or appear as repeated cycles of error and insufficient help.
pesq.d3.flow.regulation.meaning=The network indicates how events chain together during problem solving. Frequent transitions such as error to feedback to correct action suggest reorganization of action; transitions such as error to feedback to error may indicate insufficient help or an ambiguous message.
pesq.d3.flow.regulation.use=The researcher can observe whether Gerard's intervention works as mediation or merely interrupts the task. The network helps identify dependence on help, persistence of error and moments in which the interface favors correction after feedback.
pesq.d3.flow.recurrence.readingIntro=The readings were calculated from S → C → S triads in which the subject's first action was classified as an error. Identified
pesq.d3.flow.recurrence.triplets=triads initiated by subject error.
pesq.d3.flow.recurrence.nodeRule=In the network, node size indicates the recurrence of each category and line thickness indicates the frequency of the chain between error, intervention and subsequent action.
pesq.d3.flow.recurrence.relevance=this reading shows where the error tends to persist after the computer intervention and where the subject is able to resume problem solving.
pesq.d3.flow.recurrence.meaning=When the network concentrates links from error to intervention and then to a new error, there may be evidence of insufficient feedback, a nonspecific hint or a conceptual difficulty not yet overcome. When the path advances to a correct action, there is evidence of reorganization after mediation.
pesq.d3.flow.recurrence.use=The researcher can locate the Gerard points where help needs to be reformulated. The network also makes it possible to distinguish occasional error from a recurrent pattern of difficulty, mainly when the same task type reappears in several problems.
pesq.d3.flow.effectiveness.readingIntro=The reading crosses each interface intervention with the immediately following subject action. Identified
pesq.d3.flow.effectiveness.interventions=evaluable interventions in the log.
pesq.d3.flow.effectiveness.matrixRule=In the matrix, rows represent types of computer intervention and columns represent the subject's subsequent response; larger values indicate more recurrent relations.
pesq.d3.flow.effectiveness.relevance=this reading makes it possible to evaluate whether Gerard feedback and scaffolding are followed by correct action, new error, doubt or neutral action.
pesq.d3.flow.effectiveness.meaning=Interventions frequently followed by correct action suggest productive mediation. Interventions followed by new error may indicate insufficient or ambiguous help. Interventions followed by doubt may indicate unresolved reflection, and neutral actions may indicate interruption of the task flow.
pesq.d3.flow.effectiveness.use=The researcher can compare which types of intervention should be maintained, adjusted or replaced. The matrix helps support decisions on redesigning feedback, scaffolding and interface regulation messages.
