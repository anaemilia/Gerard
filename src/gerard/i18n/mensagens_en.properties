pesq.visualizations.desc=These visualizations are rendered in D3.js inside Gerard using the raw log events. They do not repeat Table 14; they summarize patterns suggested by the AI for analysis: concentration of event types by problem, flow between error, feedback, help and correction, and temporal sequence of actions by occurrence.
