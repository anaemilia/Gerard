pesq.visualizations.desc=Estas visualizações são renderizadas em D3.js dentro do Gerard, usando os eventos brutos do log. Elas não repetem a Tabela 14; sintetizam padrões que a IA sugeriu para apoiar a análise: concentração de tipos de evento por problema, fluxo entre erro, feedback, ajuda e correção, e sequência temporal das ações por ocorrência.
pesq.visualizations.aiNote=Sugestões da IA: 1) mapa de calor para localizar onde se concentram erros, feedbacks, ajudas e acertos; 2) rede de transições para observar como uma ação tende a levar a outra; 3) linha de sequência para inspecionar a ordem dos eventos em cada ocorrência.
