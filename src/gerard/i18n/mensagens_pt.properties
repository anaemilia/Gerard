pesq.d3.flow.regulation.readingIntro=As leituras foram calculadas por trios temporais S → C → S, isto é, ação do sujeito, intervenção do computador e próxima ação do sujeito. Foram identificados
pesq.d3.flow.regulation.nodeRule=Na rede, o tamanho do nó indica a quantidade de eventos daquele tipo e a espessura da linha indica a quantidade de transições entre dois tipos de evento.
pesq.d3.flow.regulation.relevance=essa leitura mostra se as ações do Gerard estão produzindo reorganização após erro ou se aparecem como ciclos repetidos de erro e ajuda insuficiente.
pesq.d3.flow.regulation.meaning=A rede indica como os eventos se encadeiam durante a resolução. Transições frequentes como erro para feedback para acerto sugerem reorganização da ação; transições como erro para feedback para erro podem indicar ajuda insuficiente ou mensagem ambígua.
pesq.d3.flow.regulation.use=O pesquisador pode observar se a intervenção do Gerard está funcionando como mediação ou apenas interrompendo a tarefa. A rede ajuda a identificar padrões de dependência da ajuda, persistência do erro e momentos em que a interface favorece correção após feedback.
pesq.d3.flow.recurrence.readingIntro=As leituras foram calculadas a partir dos trios S → C → S nos quais a primeira ação do sujeito foi classificada como erro. Foram identificados
pesq.d3.flow.recurrence.triplets=trios iniciados por erro do sujeito.
pesq.d3.flow.recurrence.nodeRule=Na rede, o tamanho do nó indica a recorrência de cada categoria e a espessura da linha indica a frequência do encadeamento entre erro, intervenção e ação posterior.
pesq.d3.flow.recurrence.relevance=essa leitura mostra em quais partes da tarefa o erro tende a persistir depois da intervenção do computador e em quais momentos o sujeito consegue retomar a resolução.
pesq.d3.flow.recurrence.meaning=Quando a rede concentra ligações de erro para intervenção e depois para novo erro, pode haver indício de feedback insuficiente, dica pouco específica ou dificuldade conceitual ainda não superada. Quando o caminho avança para acerto, há indício de reorganização após a mediação.
pesq.d3.flow.recurrence.use=O pesquisador pode localizar os pontos do Gerard em que a ajuda precisa ser reformulada. A rede também permite diferenciar erro ocasional de padrão recorrente de dificuldade, principalmente quando o mesmo tipo de tarefa reaparece em vários problemas.
pesq.d3.flow.effectiveness.readingIntro=A leitura cruza cada intervenção da interface com a ação imediatamente seguinte do sujeito. Foram identificadas
pesq.d3.flow.effectiveness.interventions=intervenções avaliáveis no log.
pesq.d3.flow.effectiveness.matrixRule=Na matriz, as linhas representam tipos de intervenção do computador e as colunas representam a resposta posterior do sujeito; valores maiores indicam relações mais recorrentes.
pesq.d3.flow.effectiveness.relevance=essa leitura permite avaliar se o feedback e o scaffolding do Gerard são seguidos por acerto, novo erro, dúvida ou ação neutra.
pesq.d3.flow.effectiveness.meaning=Intervenções frequentemente seguidas de acerto sugerem mediação produtiva. Intervenções seguidas de novo erro podem indicar ajuda insuficiente ou ambígua. Intervenções seguidas de dúvida podem indicar reflexão ainda não resolvida, e ações neutras podem indicar interrupção do fluxo da tarefa.
pesq.d3.flow.effectiveness.use=O pesquisador pode comparar quais tipos de intervenção devem ser mantidos, ajustados ou substituídos. A matriz ajuda a sustentar decisões sobre redesign do feedback, do scaffolding e das mensagens de regulação da interface.
