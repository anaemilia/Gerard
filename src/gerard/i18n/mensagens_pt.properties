pesq.d3.scaffold.inputNote=A linha do log é interpretada como uma unidade mínima de análise: agente, tarefa, C/E, instrumento e regras indicam quais apoios aparecem naquela ação.
pesq.d3.scaffold.rule=Regra visual: a linha vertical representa a ação selecionada; os símbolos ao redor indicam os tipos de scaffolding inferidos a partir dos campos da linha do log.
pesq.d3.scaffold.relevance=A relevância para o pesquisador está em passar do registro textual da ação para uma leitura visual do apoio oferecido, do erro cometido e da regra possivelmente mobilizada.
pesq.d3.scaffold.examplePrefix=Na linha selecionada do log
pesq.d3.scaffold.explain.title=Leitura da representação por linha do log
pesq.d3.scaffold.explain.meaning=Essa visualização aproxima a figura de scaffolding do log real do Gerard. Em vez de representar um episódio fixo, ela usa uma linha do log para mostrar quais apoios, ações e invariantes podem estar presentes naquele momento da interação.
pesq.d3.scaffold.explain.benefit=O pesquisador pode selecionar uma linha específica e verificar como ela se traduz visualmente em tipos de scaffolding, comparando ação do sujeito, intervenção da interface, erro, acerto e regras de representação.
