pesq.t4.problem.01.statement=Ao redor da mesa estão sentados 4 garotos e 7 garotas. Quantas pessoas estão sentadas ao redor da mesa?
pesq.t4.problem.02.statement=Ricardo saiu de casa com 6 bolas de gude. Ao voltar ele possuía duas bolas. O que aconteceu no jogo?
pesq.t4.problem.03.statement=Maria comprou uma caixa de bombons por 4 reais e ainda ficou com 4 reais. Quanto ela possuía antes de fazer a compra?
pesq.t4.problem.04.statement=Ricardo tem 6 anos, Carlos tem 4 anos a mais do que ele. Quantos anos tem Carlos?
pesq.t4.problem.05.statement=Carlos tem 7 reais e Luiz tem 6 reais a menos do que ele. Quantos reais tem Luiz?
pesq.t4.problem.06.statement=Ricardo tem 9 brinquedos dos quais uma parte são carrinhos e a outra parte são bonecos. Sabendo que existem 4 bonecos, quantos são os carrinhos?
pesq.t6.title=Tabela 6 - Quantidade de situações-problema analisadas e ações por usuário
pesq.t6.desc=Formato do estudo: usuário, situações-problema analisadas e ações do sujeito + computador/interface. Os totais são recalculados lendo todos os arquivos TSV de log.
pesq.t6.tableTitle=Quantidade de situações-problema analisadas e ações por usuário
pesq.t7.title=Tabela 7 - Objetos presentes no contexto da ação
pesq.t7.desc=Formato do estudo: identificação e descrição dos objetos. A terceira coluna mostra quantas vezes o objeto aparece nos dados brutos; isso mantém o sentido analítico da tabela e adiciona a consulta ao log.
pesq.t7.tableTitle=Objetos presentes no contexto da ação
pesq.t13.title=Tabela 13 - Exemplos de ações neutras nos dados analisados
pesq.t13.desc=Formato do estudo: tipo de ação neutra, ocorrência na situação-problema, exemplo e justificativa. O conteúdo é sintetizado a partir das ações do sujeito marcadas com C/E = -.
pesq.t13.tableTitle=Exemplos de ações neutras
pesq.t14.title=Tabela 14 - Quantidade de ações agrupadas por problema nos dados analisados
pesq.t14.desc=Formato do estudo: problema, número de ocorrências, ações do sujeito, ações do computador, total, acertos, erros e ações neutras. Esta tabela é calculada diretamente a partir do log.
pesq.t14.tableTitle=Quantidade de ações agrupadas por problema
pesq.t15.title=Tabela 15 - Agrupamento qualitativo dos episódios analisados por problema
pesq.t15.desc=Formato do estudo: grupo qualitativo, critério de similaridade e problemas exemplares associados. Os grupos são preenchidos por regras de consulta aos eventos do log.
