pesq.d3.explain.heatmap.title=Leitura do mapa de calor
pesq.d3.explain.heatmap.meaning=No âmbito do Gerard, a concentração de células indica quais problemas mobilizam mais acertos, erros, feedbacks, ajudas ou dúvidas. Um problema com muitas ocorrências de erro e ajuda pode indicar maior dificuldade de modelagem, sobretudo na relação entre o enunciado e o diagrama.
pesq.d3.explain.heatmap.benefit=O pesquisador pode localizar rapidamente problemas que exigem revisão do enunciado, da categoria de Vergnaud, da mensagem de feedback ou do scaffolding oferecido. Também pode comparar se certos tipos de erro se concentram em composição, transformação ou comparação.
pesq.d3.explain.flow.title=Leitura da rede de transições
pesq.d3.explain.flow.meaning=A rede indica como os eventos se encadeiam durante a resolução. Transições frequentes como erro para feedback para acerto sugerem reorganização da ação; transições como erro para feedback para erro podem indicar ajuda insuficiente ou mensagem ambígua.
pesq.d3.explain.flow.benefit=O pesquisador pode observar se a intervenção do Gerard está funcionando como mediação ou apenas interrompendo a tarefa. A rede ajuda a identificar padrões de dependência da ajuda, persistência do erro e momentos em que a interface favorece correção após feedback.
pesq.d3.explain.sequence.title=Leitura da sequência temporal
pesq.d3.explain.sequence.meaning=Cada linha mostra a sucessão das ações em uma ocorrência usuário/problema. Sequências curtas com muitos acertos sugerem fluência; sequências longas com alternância de erro, feedback e ajuda indicam maior custo interacional e possível instabilidade conceitual.
pesq.d3.explain.sequence.benefit=O pesquisador pode acompanhar o percurso do usuário sem depender apenas do total de erros. A visualização permite identificar em que momento da resolução o erro aparece, se o usuário corrige após ajuda e se o problema exige muitas ações até ser concluído.
pesq.d3.explain.exampleLabel=Exemplo lido da visualização
pesq.d3.explain.noExample=Ainda não há dados suficientes para gerar uma leitura automática.
pesq.d3.explain.heatmap.rule=No mapa de calor, a cor identifica o tipo de evento e a intensidade da célula indica a frequência: quanto mais escura a célula, maior a quantidade de ocorrências.
pesq.d3.explain.flow.rule=Na rede, o tamanho do nó indica a quantidade de eventos daquele tipo e a espessura da linha indica a quantidade de transições entre dois tipos de evento.
pesq.d3.explain.sequence.rule=Na sequência temporal, a posição horizontal indica a ordem da ação; a cor indica o tipo de evento; a borda escura indica ação do computador/interface.
pesq.d3.explain.colorLegend=Legenda das cores: verde = acerto; vermelho = erro; laranja = feedback; azul = ajuda; roxo = dúvida; cinza = ação neutra; azul acinzentado = ação da interface; grafite = ação do sujeito.
