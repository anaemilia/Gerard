pesq.summary.text=Esta visão usa apenas o modelo de análise do estudo. Os números apresentados são gerados pelo uso real do Gerard. Cada ação relevante é gravada em arquivo TSV com as colunas: agente da ação, problema, tentativa, tarefa, C/E, instrumento, função do artefato e regras. As abas e gráficos são recalculados a partir desses arquivos.\\n\\nArquivo da sessão atual: {0}
pesq.t4.title=Tabela 4 - Identificação dos problemas utilizados nos dados analisados
pesq.t4.desc=Formato do estudo: rótulo do problema, tipo esperado e enunciado. A tabela é reconstruída a partir dos problemas presentes no log; quando o log não traz o enunciado, é usado o enunciado-padrão correspondente ao rótulo analítico.
