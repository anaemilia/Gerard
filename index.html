document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { color: var(--color-accent); border-color: var(--color-accent); }\n.btn-primary:hover { background: color-mix(in srgb, var(--color-accent) 12%, transparent); }\n.btn-primary:active { background: color-mix(in srgb, var(--color-accent) 22%, transparent); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: transparent;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { color: var(--color-accent); box-shadow: inset 0 0 0 1px var(--color-accent); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: transparent; border: 1px solid var(--color-divider);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display ily:var(--font-heading);font-weight:400;font-size:22px;line-height:1.15;margin:0 0 4px;\">{{ m.name }}<\u002Fh3>\n            <p style=\"font-size:14px;line-height:var(--half);letter-spacing:0.02em;color:var(--color-accent-700);margin:0 0 var(--space-2);\">{{ m.role }}<\u002Fp>\n            <p style=\"font-size:14.5px;line-height:calc(var(--leading) - 5px);margin:0;color:color-mix(in srgb, var(--color-text) 72%, transparent);\">{{ m.org }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"hr\">\n\n    <section id=\"faq\" style=\"padding:calc(3*var(--leading)) 0 calc(2.5*var(--leading));\">\n      <span style=\"display:block;font-size:13px;line-height:var(--half);letter-spacing:0.08em;text-transform:uppercase;color:var(--color-accent-700);margin-bottom:var(--half);\">{{ faqKicker }}<\u002Fspan>\n      <h2 style=\"font-family:var(--font-heading);font-weight:400;font-size:clamp(30px,3.4vw,44px);line-height:1.12;letter-spacing:-0.008em;margin:0 0 var(--leading);max-width:22ch;\">{{ faqTitle }}<\u002Fh2>\n      <div style=\"max-width:78ch;\">\n        <sc-for list=\"{{ faq }}\" as=\"q\" hint-placeholder-count=\"5\">\n          <details style=\"border-top:1px solid var(--color-divider);padding:var(--space-3) 0;\">\n            <summary style=\"font-family:var(--font-heading);font-weight:400;font-size:20px;line-height:1.25;cursor:pointer;list-style:none;\">{{ q.q }}<\u002Fsummary>\n            <p style=\"font-size:15.5px;line-height:var(--leading);margin:var(--space-2) 0 0;color:color-mix(in srgb, var(--color-text) 78%, transparent);\">{{ q.a }}<\u002Fp>\n          <\u002Fdetails>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <hr class=\"hr\">\n\n    <section id=\"contato\" style=\"padding:calc(3*var(--leading)) 0;\">\n      <h2 style=\"font-family:var(--font-heading);font-weight:400;font-size:clamp(28px,3vw,40px);line-height:1.12;margin:0;\">{{ contactTitle }}<\u002Fh2>\n      <p style=\"font-size:16px;line-height:var(--leading);max-width:var(--measure);margin:calc(var(--leading) - 6px) 0 0;color:color-mix(in srgb, var(--color-text) 80%, transparent);\">{{ contactSub }}<\u002Fp>\n      <form sc-camel-on-submit=\"{{ onSubmit }}\" style=\"display:flex;gap:var(--space-3);align-items:stretch;max-width:520px;margin-top:var(--leading);flex-wrap:wrap;\">\n        <input class=\"input\" type=\"email\" required=\"\" placeholder=\"{{ emailPlaceholder }}\" aria-label=\"email\" style=\"flex:1;min-width:220px;min-height:38px;\">\n        <button type=\"submit\" class=\"btn btn-primary\" style=\"min-height:38px;\">{{ contactCta }}<\u002Fbutton>\n      <\u002Fform>\n      <p style=\"font-size:14px;line-height:var(--leading);margin-top:var(--space-3);color:var(--color-accent-700);min-height:var(--leading);\">{{ formMsg }}<\u002Fp>\n    <\u002Fsection>\n\n    <footer style=\"padding:calc(1.5*var(--leading)) 0 calc(2*var(--leading));border-top:1px solid var(--color-divider);font-size:13px;line-height:var(--leading);color:color-mix(in srgb, var(--color-text) 62%, transparent);display:flex;justify-content:space-between;flex-wrap:wrap;gap:var(--space-2);\">\n      <span>{{ footerLeft }}<\u002Fspan>\n      <span>{{ footerRight }}<\u002Fspan>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { lang: 'pt', formMsg: '' };\n\n  content() {\n    const pt = {\n      navFuncs: 'Funcionalidades', navHow: 'Como funciona', navTheory: 'Fundamentação', navTeam: 'Equipe', navCta: 'Acessar',\n      heroKicker: 'Software educativo',\n      heroTitle: ['Da situação', 'ao conceito.'],\n      heroSub: 'Gerard é um software educativo fundamentado na Teoria dos Campos Conceituais de Gérard Vergnaud. Organiza a aprendizagem em torno de situações, apoiando estudantes e professores no desenvolvimento de conceitos — e não apenas na memorização de procedimentos.',\n      ctaPrimary: 'Testar a versão', ctaSecondary: 'Ler a fundamentação',\n      stats: [\n        { num: '2', label: 'versões desenvolvidas', color: 'var(--color-accent)' },\n        { num: '4', label: 'pesquisadores e desenvolvedores', color: 'var(--color-text)' },\n        { num: '2', label: 'universidades federais', color: 'var(--color-text)' },\n        { num: '1', label: 'teoria — campos conceituais', color: 'var(--color-text)' },\n      ],\n      funcsKicker: 'O que o Gerard oferece', funcsTitle: 'Uma ferramenta desenhada em torno de situações',\n      features: [\n        { no: '01', title: 'Situações estruturadas', body: 'Atividades organizadas em classes de situações que dão sentido aos conceitos, na tradição de Vergnaud — o problema vem primeiro.' },\n        { no: '02', title: 'Percurso do estudante', body: 'Uma sequência clara que progride do concreto ao formal, respeitando o tempo próprio da conceitualização.' },\n        { no: '03', title: 'Painel do professor', body: 'Registro do percurso de cada estudante: situações resolvidas, estratégias mobilizadas e dificuldades recorrentes.' },\n        { no: '04', title: 'Representações múltiplas', body: 'Um mesmo conceito abordado por diferentes representações, favorecendo as conexões que sustentam a compreensão.' },\n        { no: '05', title: 'Retorno imediato', body: 'O estudante age sobre a situação e observa as consequências — a base para revisar esquemas e invariantes.' },\n        { no: '06', title: 'Adaptatividade (em desenvolvimento)', body: 'As versões atuais oferecem um percurso fixo; o ajuste automático ao desempenho de cada estudante está em construção.' },\n      ],\n      howKicker: 'Como funciona', howTitle: 'Quatro passos, do problema ao conceito',\n      steps: [\n        { no: '01', title: 'Escolha o campo conceitual', body: 'Selecione o domínio de conhecimento e o nível dos estudantes.' },\n        { no: '02', title: 'Apresente as situações', body: 'O software propõe situações cuidadosamente ordenadas que dão sentido ao conceito.' },\n        { no: '03', title: 'Observe os esquemas', body: 'Acompanhe as estratégias e os invariantes operatórios que os estudantes mobilizam ao resolver.' },\n        { no: '04', title: 'Avance na conceitualização', body: 'Novas situações ampliam e consolidam o conceito, do concreto ao formal.' },\n      ],\n      theoryKicker: 'A teoria por trás do nome', theoryTitle: 'Gérard Vergnaud e os campos conceituais',\n      theoryBody: [\n        'Gérard Vergnaud (1933–2021), discípulo de Jean Piaget, propôs a Teoria dos Campos Conceituais para explicar como o conhecimento se desenvolve ao longo do tempo. Para Vergnaud, um conceito não se aprende isolado, mas no interior de um campo — um conjunto de situações, conceitos e representações que se apoiam mutuamente.',\n        'No centro da teoria está a ideia de esquema: a organização invariante da conduta diante de uma classe de situações. É resolvendo situações, e não repetindo definições, que os invariantes operatórios se constroem.',\n        'Gerard traduz esse princípio em software: a situação vem primeiro, e o conceito emerge dela. Daí o nome — uma homenagem ao pesquisador cuja obra orienta cada decisão de projeto.',\n      ],\n      portraitPlaceholder: 'Arraste um retrato ou diagrama (opcional)',\n      portraitCaption: 'Gérard Vergnaud (1933–2021)',\n      shotsKicker: 'A versão funcional', shotsTitle: 'O software em uso',\n      shotsNote: 'Já existe uma versão funcional do Gerard. Arraste aqui capturas de tela reais — a tela do estudante, o painel do professor e uma situação em resolução.',\n      shots: [\n        { id: 'shot-1', placeholder: 'Composição de Medidas' },\n        { id: 'shot-2', placeholder: 'Comparação de Medidas' },\n        { id: 'shot-3', placeholder: 'Transformação de Medidas' },\n        { id: 'shot-4', placeholder: 'Construção de situação-problema a partir do diagrama preenchido' },\n        { id: 'shot-5', placeholder: 'Tela de curadoria de situação-problema' },\n        { id: 'shot-6', placeholder: 'Visão do pesquisador' },\n      ],\n      accessKicker: 'Acesso e download', accessTitle: 'Experimente o Gerard',\n      access: [\n        { title: 'Testar online', body: 'Acesse a versão funcional diretamente no navegador, sem instalação. Ideal para uma primeira experiência em sala ou individualmente.', cta: 'Abrir a versão', href: '#' },\n        { title: 'Baixar', body: 'Prefere uma instalação local? Baixe o Gerard com as instruções de instalação e comece a usar com sua turma.', cta: 'Baixar o software', href: '#' },\n      ],\n      teamKicker: 'Quem faz o Gerard', teamTitle: 'Uma equipe de pesquisa e desenvolvimento',\n      team: [\n        { name: 'Alex Sandro Gomes', role: 'Pesquisador', org: 'Universidade Federal de Pernambuco' },\n        { name: 'Ana Emília de Melo Queiroz', role: 'Pesquisadora e desenvolvedora', org: 'Universidade Federal do Vale do São Francisco' },\n        { name: 'Kécia de Moura', role: 'Desenvolvedora — segunda versão', org: 'Desenvolvimento da versão sem adaptatividade' },\n        { name: 'Maurício Motta Braga', role: 'Desenvolvedor — primeira versão', org: 'Desenvolvimento da versão sem adaptatividade' },\n      ],\n      faqKicker: 'Perguntas frequentes', faqTitle: 'Dúvidas comuns',\n      faq: [\n        { q: 'Preciso instalar algo para usar o Gerard?', a: 'Há uma versão funcional acessível para teste. Você pode experimentá-la online ou baixar uma versão local — as duas opções estão na seção de acesso.' },\n        { q: 'Para quais níveis de ensino serve?', a: 'O Gerard foi pensado para a educação básica, mas sua abordagem por campos conceituais se adapta a diferentes domínios e faixas. Escreva-nos para conversar sobre o seu contexto.' },\n        { q: 'O software é adaptativo?', a: 'As versões atuais oferecem um percurso estruturado de situações. A adaptatividade — o ajuste automático ao desempenho de cada estudante — está em desenvolvimento.' },\n        { q: 'O Gerard é gratuito?', a: 'Gerard é um projeto de pesquisa acadêmica. Entre em contato para condições de uso na sua escola, rede ou instituição.' },\n        { q: 'Como posso colaborar ou pesquisar com o Gerard?', a: 'Recebemos com interesse parcerias de pesquisa e usos em sala. Deixe seu e-mail abaixo e retornaremos.' },\n      ],\n      contactTitle: 'Fique por dentro', contactSub: 'Deixe seu e-mail para receber novidades sobre novas versões, materiais de apoio e oportunidades de pesquisa com o Gerard.',\n      emailPlaceholder: 'voce@exemplo.com', contactCta: 'Inscrever-se',\n      footerLeft: 'Gerard — software educativo · em homenagem a Gérard Vergnaud',\n      footerRight: 'UFPE · UNIVASF',\n    };\n    const en = {\n      navFuncs: 'Features', navHow: 'How it works', navTheory: 'Foundations', navTeam: 'Team', navCta: 'Access',\n      heroKicker: 'Educational software',\n      heroTitle: ['From the situation', 'to the concept.'],\n      heroSub: \"Gerard is educational software grounded in Gérard Vergnaud's Theory of Conceptual Fields. It organises learning around situations, supporting students and teachers in the development of concepts — not merely the memorisation of procedures.\",\n      ctaPrimary: 'Try the live version', ctaSecondary: 'Read the theory',\n      stats: [\n        { num: '2', label: 'versions developed', color: 'var(--color-accent)' },\n        { num: '4', label: 'researchers and developers', color: 'var(--color-text)' },\n        { num: '2', label: 'federal universities', color: 'var(--color-text)' },\n        { num: '1', label: 'theory — conceptual fields', color: 'var(--color-text)' },\n      ],\n      funcsKicker: 'What Gerard offers', funcsTitle: 'A tool designed around situations',\n      features: [\n        { no: '01', title: 'Structured situations', body: 'Activities organised into classes of situations that give meaning to concepts, in Vergnaud\\u2019s tradition — the problem comes first.' },\n        { no: '02', title: 'Student pathway', body: 'A clear sequence that progresses from the concrete to the formal, respecting the time conceptualisation takes.' },\n        { no: '03', title: 'Teacher dashboard', body: \"A record of each student's path: situations solved, strategies mobilised and recurring difficulties.\" },\n        { no: '04', title: 'Multiple representations', body: 'The same concept approached through different representations, fostering the connections that underpin understanding.' },\n        { no: '05', title: 'Immediate feedback', body: 'The student acts on the situation and observes the consequences — the basis for revising schemes and invariants.' },\n        { no: '06', title: 'Adaptivity (in development)', body: 'The current versions offer a fixed pathway; automatic adjustment to each student\\u2019s performance is under construction.' },\n      ],\n      howKicker: 'How it works', howTitle: 'Four steps, from problem to concept',\n      steps: [\n        { no: '01', title: 'Choose the conceptual field', body: 'Select the knowledge domain and the level of your students.' },\n        { no: '02', title: 'Present the situations', body: 'The software proposes carefully ordered situations that give meaning to the concept.' },\n        { no: '03', title: 'Observe the schemes', body: 'Follow the strategies and operational invariants students mobilise as they solve.' },\n        { no: '04', title: 'Advance conceptualisation', body: 'New situations broaden and consolidate the concept, from the concrete to the formal.' },\n      ],\n      theoryKicker: 'The theory behind the name', theoryTitle: 'Gérard Vergnaud and conceptual fields',\n      theoryBody: [\n        \"Gérard Vergnaud (1933–2021), a student of Jean Piaget, proposed the Theory of Conceptual Fields to explain how knowledge develops over time. For Vergnaud, a concept is not learned in isolation but within a field — a set of situations, concepts and representations that support one another.\",\n        'At the heart of the theory is the idea of the scheme: the invariant organisation of conduct in the face of a class of situations. It is by solving situations, rather than repeating definitions, that operational invariants are built.',\n        'Gerard turns this principle into software: the situation comes first, and the concept emerges from it. Hence the name — a tribute to the researcher whose work guides every design decision.',\n      ],\n      portraitPlaceholder: 'Drop a portrait or diagram (optional)',\n      portraitCaption: 'Gérard Vergnaud (1933–2021)',\n      shotsKicker: 'The working version', shotsTitle: 'The software in use',\n      shotsNote: 'A working version of Gerard already exists. Drop real screenshots here — the student screen, the teacher dashboard, and a situation being solved.',\n      shots: [\n        { id: 'shot-1', placeholder: 'Composition of Measures' },\n        { id: 'shot-2', placeholder: 'Comparison of Measures' },\n        { id: 'shot-3', placeholder: 'Transformation of Measures' },\n        { id: 'shot-4', placeholder: 'Problem-situation construction from the filled diagram' },\n        { id: 'shot-5', placeholder: 'Problem-situation curation screen' },\n        { id: 'shot-6', placeholder: 'Researcher view' },\n      ],\n      accessKicker: 'Access and download', accessTitle: 'Try Gerard',\n      access: [\n        { title: 'Try online', body: 'Open the working version straight in the browser, no install required. Ideal for a first experience in class or on your own.', cta: 'Open the version', href: '#' },\n        { title: 'Download', body: 'Prefer a local install? Download Gerard with installation instructions and start using it with your class.', cta: 'Download the software', href: '#' },\n      ],\n      teamKicker: 'Who makes Gerard', teamTitle: 'A research and development team',\n      team: [\n        { name: 'Alex Sandro Gomes', role: 'Researcher', org: 'Federal University of Pernambuco' },\n        { name: 'Ana Emília de Melo Queiroz', role: 'Researcher and developer', org: 'Federal University of the São Francisco Valley' },\n        { name: 'Kécia de Moura', role: 'Developer — second version', org: 'Development of the non-adaptive version' },\n        { name: 'Maurício Motta Braga', role: 'Developer — first version', org: 'Development of the non-adaptive version' },\n      ],\n      faqKicker: 'Frequently asked questions', faqTitle: 'Common questions',\n      faq: [\n        { q: 'Do I need to install anything to use Gerard?', a: 'A working version is available for testing. You can try it online or download a local version — both options are in the access section.' },\n        { q: 'Which education levels is it for?', a: 'Gerard was designed for basic education, but its conceptual-fields approach adapts to different domains and age groups. Write to us to discuss your context.' },\n        { q: 'Is the software adaptive?', a: 'The current versions offer a structured pathway of situations. Adaptivity — automatic adjustment to each student\\u2019s performance — is in development.' },\n        { q: 'Is Gerard free?', a: 'Gerard is an academic research project. Get in touch for terms of use at your school, network or institution.' },\n        { q: 'How can I collaborate or do research with Gerard?', a: 'We warmly welcome research partnerships and classroom use. Leave your email below and we will get back to you.' },\n      ],\n      contactTitle: 'Stay in the loop', contactSub: 'Leave your email to receive news about new versions, supporting materials and research opportunities with Gerard.',\n      emailPlaceholder: 'you@example.com', contactCta: 'Subscribe',\n      footerLeft: 'Gerard — educational software · in tribute to Gérard Vergnaud',\n      footerRight: 'UFPE · UNIVASF',\n    };\n    return this.state.lang === 'pt' ? pt : en;\n  }\n\n  renderVals() {\n    const isPt = this.state.lang === 'pt';\n    const srcs = (typeof window !== 'undefined' && window.FIG_SRCS) || {};\n    const c = this.content();\n    const shots = (c.shots || []).map((s) => ({ ...s, src: srcs[s.id] || '' }));\n    return {\n      ...c,\n      shots,\n      portraitSrc: srcs['gerard-portrait'] || '',\n      isPt, isEn: !isPt,\n      setPt: () => this.setState({ lang: 'pt' }),\n      setEn: () => this.setState({ lang: 'en' }),\n      tabBgPt: isPt ? 'var(--color-accent-100)' : 'transparent',\n      tabBgEn: !isPt ? 'var(--color-accent-100)' : 'transparent',\n      tabColorPt: isPt ? 'var(--color-accent-800)' : 'inherit',\n      tabColorEn: !isPt ? 'var(--color-accent-800)' : 'inherit',\n      formMsg: this.state.formMsg,\n      onSubmit: (e) => {\n        e.preventDefault();\n        this.setState({ formMsg: isPt ? 'Obrigado! Entraremos em contato em breve.' : 'Thank you! We will be in touch soon.' });\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
