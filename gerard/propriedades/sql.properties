#o comando PRAGMA foreign_keys = ON; abilita chave estrangeira no sqlite
CRIAR_TABELAS= PRAGMA foreign_keys = ON; \
CREATE TABLE IF NOT EXISTS Artefatos (   \
       NomeArtefato         VARCHAR(100),  \
       Funcao               VARCHAR(100),  \
       CodArtefatos         INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT  \
);  \
CREATE TABLE IF NOT EXISTS Artefatos_Regras (  \
       CodArtefatos         VARCHAR(20),  \
       CodRegra             INTEGER NOT NULL,  \
	   FOREIGN KEY (CodRegra)  \
                             REFERENCES Regras  (CodRegra)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
	   FOREIGN KEY (CodArtefatos)  \
                             REFERENCES Artefatos  (CodArtefatos)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
	   PRIMARY KEY (CodArtefatos, CodRegra)  \
);  \
CREATE TABLE IF NOT EXISTS Componentes (  \
       CodProblema          INTEGER NOT NULL,  \
       Valor                VARCHAR(20) NOT NULL,  \
       Sinal                VARCHAR(20),  \
       Representacao        VARCHAR(20) NOT NULL,  \
       PosicaoNoDiagrama    INTEGER NOT NULL,  \
	   FOREIGN KEY (CodProblema)  \
                             REFERENCES Problemas  (CodProblema)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
   PRIMARY KEY (CodProblema, PosicaoNoDiagrama) \
);  \
CREATE TABLE IF NOT EXISTS Conceitos (  \
       CodConceito          INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,  \
       Descricao            VARCHAR(100)  \
	    \
);  \
CREATE TABLE IF NOT EXISTS Conceitos_Teoremas (  \
       CodConceito          INTEGER NOT NULL,  \
       CodTeorema           INTEGER NOT NULL,  \
	   FOREIGN KEY (CodTeorema)  \
                             REFERENCES Teoremas  (CodTeorema)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
		FOREIGN KEY (CodConceito)  \
                             REFERENCES Conceitos  (CodConceito)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
	   PRIMARY KEY (CodConceito, CodTeorema)  \
);  \
CREATE TABLE IF NOT EXISTS Erros (  \
       CodErro              INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,  \
       Descricao            VARCHAR(100)  \
);  \
CREATE TABLE IF NOT EXISTS EstadoSalvo ( \
       Passo                INTEGER NOT NULL, \
       ContadorDragAndDrop  INTEGER NOT NULL, \
       ContadorPosSelecao   INTEGER NOT NULL, \
       CodTentativa         INTEGER NOT NULL, \
       CPF                  VARCHAR(13) NOT NULL, \
       CodProblema          INTEGER NOT NULL, \
	   FOREIGN KEY (CodTentativa, CPF, CodProblema) \
                             REFERENCES Tentativas  (CodTentativa, \
              CPF, CodProblema) \
                             ON DELETE RESTRICT \
                             ON UPDATE RESTRICT, \
	   PRIMARY KEY (CodTentativa, CPF, CodProblema) \
); \
CREATE TABLE IF NOT EXISTS Etapas (  \
       CodEtapa             INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,  \
       Descricao            VARCHAR(100) NOT NULL,  \
       Valor                VARCHAR(20) NOT NULL,  \
       CodTentativa         INTEGER NOT NULL,  \
       Ator                 VARCHAR(20) NOT NULL,  \
       CodErro              INTEGER NOT NULL,  \
       CodObjeto            INTEGER NOT NULL,  \
       CPF                  VARCHAR(13) NOT NULL,  \
       CodProblema          INTEGER NOT NULL,  \
	   FOREIGN KEY (CodObjeto)  \
                             REFERENCES Objetos  (CodObjeto)  \
                             ON DELETE SET NULL  \
                             ON UPDATE SET NULL,  \
		FOREIGN KEY (CodErro)  \
                             REFERENCES Erros  (CodErro)  \
                             ON DELETE SET NULL  \
                             ON UPDATE SET NULL,  \
		FOREIGN KEY (CodTentativa, CPF, CodProblema)  \
                             REFERENCES Tentativas  (CodTentativa,   \
              CPF, CodProblema)  \
                             ON DELETE SET NULL  \
                             ON UPDATE SET NULL  \
);  \
CREATE TABLE IF NOT EXISTS Etapas_Artefatos (  \
       CodEtapa             INTEGER NOT NULL, \
       CodArtefatos         INTEGER NOT NULL,  \
	   FOREIGN KEY (CodArtefatos)  \
                             REFERENCES Artefatos  (CodArtefatos)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
		FOREIGN KEY (CodEtapa)  \
                             REFERENCES Etapas  (CodEtapa)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
	   PRIMARY KEY (CodEtapa, CodArtefatos)  \
);  \
CREATE TABLE IF NOT EXISTS Objetos (  \
       CodObjeto            INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,  \
       Objeto               VARCHAR(100)  \
);  \
CREATE TABLE IF NOT EXISTS Problemas (  \
       CodProblema          INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,  \
       SituacaoProblema     VARCHAR(300) NOT NULL,  \
       Categoria            VARCHAR(20) NOT NULL,  \
       rotuloEsquerdo       VARCHAR(30),  \
       rotuloDireito        VARCHAR(30),  \
       Resultado            VARCHAR(20) NOT NULL  \
);  \
CREATE TABLE IF NOT EXISTS Problemas_conceitos (  \
       CodProblema          INTEGER NOT NULL,  \
       CodConceito          INTEGER NOT NULL,  \
	   FOREIGN KEY (CodConceito)  \
                             REFERENCES Conceitos  (CodConceito)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
	   FOREIGN KEY (CodProblema)  \
                             REFERENCES Problemas  (CodProblema)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
	   PRIMARY KEY (CodProblema, CodConceito)  \
);  \
CREATE TABLE IF NOT EXISTS Regras (  \
       CodRegra             INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,  \
       Descricao            VARCHAR(100)  \
);  \
CREATE TABLE IF NOT EXISTS Tentativas (  \
       CodTentativa         INTEGER NOT NULL,  \
       CPF                  VARCHAR(13) NOT NULL, \
       CodProblema          INTEGER NOT NULL,  \
	   data                  DATE, \
	   FOREIGN KEY (CPF, CodProblema)   \
                             REFERENCES Usuarios_Problemas  (CPF,CodProblema) \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT, \
	   PRIMARY KEY (CodTentativa, CPF, CodProblema)   \
);  \
CREATE TABLE IF NOT EXISTS Teoremas (  \
       CodTeorema           INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,  \
       Descricao            VARCHAR(100)  \
);  \
CREATE TABLE IF NOT EXISTS Usuarios ( \
       CPF                  VARCHAR(13) NOT NULL,  \
	   Senha                VARCHAR(20) NOT NULL,  \
       Nome                 VARCHAR(50) NOT NULL,  \
	   Idade                INTEGER NOT NULL,  \
	   Sexo                 VARCHAR(10) NOT NULL,  \
       GrauFormacao         VARCHAR(20) NOT NULL,  \
	   Email                VARCHAR(50) NOT NULL,  \
       NomeEscola           VARCHAR(50) NOT NULL, \
       CidadeEscola         VARCHAR(50) NOT NULL,  \
       EstadoEscola         VARCHAR(50) NOT NULL,  \
	   PRIMARY KEY (CPF)  \
); \
CREATE TABLE IF NOT EXISTS Usuarios_Problemas (  \
       CPF                  VARCHAR(13) NOT NULL,  \
       CodProblema          INTEGER NOT NULL,  \
	   FOREIGN KEY (CodProblema)  \
                             REFERENCES Problemas  (CodProblema)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
	   FOREIGN KEY (CPF)  \
                             REFERENCES Usuarios  (CPF)  \
                             ON DELETE RESTRICT  \
                             ON UPDATE RESTRICT,  \
	   PRIMARY KEY (CPF, CodProblema)  \
);


