INSERT_PROBLEMAS=INSERT INTO problemas(CodProblema,SituacaoProblema,Categoria,Resultado) VALUES(1,"Maria  faz cole\u00e7\u00e3o de figurinhas. Ela tem 32 figurinhas, sua m\u00e3e a presenteu com mais 22 figurinhas. Quantas figurinhas Maria tem em sua cole\u00e7\u00e3o agora?","TRANSFORMACAO","54"); \
